name: Android CI (Compile APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. 设置 JDK 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    # 3. 创建基础的 local.properties
    - name: Create local.properties
      run: |
        touch local.properties
        echo "sdk.dir=$ANDROID_HOME" >> local.properties

    # 4. 赋予 Gradle 脚本执行权限
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 5. 核心修改：改为编译 assembleDebug，绕过 Release 签名和本地密钥限制
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 6. 将编译好的 Debug APK 上传到 GitHub Actions
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClipboardList-Debug-APK
        path: '**/build/outputs/apk/debug/*.apk' # 注意：路径也同步改为了 debug
        retention-days: 7
