name: Android CI (Compile APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. 设置 JDK 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    # 3. 核心修复：动态创建 local.properties 文件，防止 build.gradle 报错
    - name: Create local.properties
      run: |
        touch local.properties
        echo "sdk.dir=$ANDROID_HOME" >> local.properties
        echo "创建 local.properties 成功，已自动注入 Android SDK 路径。"

    # 4. 赋予 Gradle 脚本执行权限
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 5. 执行编译
    - name: Build with Gradle
      run: ./gradlew assembleRelease

    # 6. 将编译好的 APK 上传到 GitHub Actions
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClipboardList-Release-APK
        path: '**/build/outputs/apk/release/*.apk'
        retention-days: 7
