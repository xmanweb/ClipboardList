name: Android CI (Compile APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. 设置 JDK 环境（升级至 JDK 21 以匹配源码要求）
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21' # <-- 核心修改：改为 21
        distribution: 'zulu'
        cache: 'gradle'

    # 3. 创建基础 local.properties
    - name: Create local.properties
      run: |
        touch local.properties
        echo "sdk.dir=$ANDROID_HOME" >> local.properties

    # 4. 暴力修复：注释/替换掉引发崩溃的签名/文件流读取逻辑
    - name: Patch build.gradle to bypass missing files
      run: |
        sed -i '12s/file(.*)/file("local.properties")/' app/build.gradle
        sed -i 's/rootProject.file(prop/file("local.properties"/g' app/build.gradle || true

    # 5. 赋予 Gradle 脚本执行权限
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 6. 执行 Debug 编译
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 7. 将编译好的 Debug APK 上传
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClipboardList-Debug-APK
        path: '**/build/outputs/apk/debug/*.apk'
        retention-days: 7
