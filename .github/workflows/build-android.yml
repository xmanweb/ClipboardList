name: Android CI (Compile APK)

on:
  push:
    branches: [ "main", "master" ] # 当推送到 main 或 master 分支时触发
  pull_request:
    branches: [ "main", "master" ] # 当向 main 或 master 分支发起 PR 时触发
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击按钮触发编译

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. 设置 JDK 环境（Android 目前主流且兼容 AGP 8.x 的版本为 JDK 17）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu' # 使用 zulu 分发版，稳定且构建速度快
        cache: 'gradle'      # 开启 gradle 缓存，加速后续的构建

    # 3. 赋予 Gradle 脚本执行权限（防止在 Windows 上提交的代码在 Linux 容器中无权限）
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 4. 执行编译（这里编译的是 Release 版本，若需要测试版可改为 assembleDebug）
    - name: Build with Gradle
      run: ./gradlew assembleRelease

    # 5. 寻找并收集编译出来的 APK 文件（支持多 module 结构）
    - name: Find APKs
      id: find_apks
      run: |
        echo "Listing build outputs:"
        find . -regex '.*build/outputs/apk/.*\.apk'
        
    # 6. 将编译好的 APK 上传到 GitHub Actions, 供你直接下载
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClipboardList-Release-APK
        path: '**/build/outputs/apk/release/*.apk' # 匹配 Release 目录下的 apk
        retention-days: 7 # 产生的安装包在 GitHub 上保留 7 天
